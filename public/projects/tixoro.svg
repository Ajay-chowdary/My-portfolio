<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tixoro cover">
  <defs>
    <radialGradient id="g2" cx="58%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#F59E0B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots2" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#322B21"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="#14110E"/>
  <rect width="800" height="500" fill="url(#dots2)"/>
  <rect width="800" height="500" fill="url(#g2)"/>

  <!-- marketplace connection nodes -->
  <g stroke="#322B21" stroke-width="2">
    <line x1="120" y1="120" x2="300" y2="250"/>
    <line x1="120" y1="380" x2="300" y2="250"/>
    <line x1="680" y1="130" x2="500" y2="250"/>
    <line x1="680" y1="370" x2="500" y2="250"/>
  </g>
  <g fill="#1C1813" stroke="#A89D8C" stroke-width="2">
    <circle cx="120" cy="120" r="12"/>
    <circle cx="120" cy="380" r="12"/>
    <circle cx="680" cy="130" r="12"/>
    <circle cx="680" cy="370" r="12"/>
  </g>

  <!-- ticket -->
  <g transform="translate(400 250) rotate(-8)">
    <g transform="translate(-160 -95)">
      <path d="M16 0 H304 a16 16 0 0 1 16 16 V70 a18 18 0 0 0 0 36 V174 a16 16 0 0 1 -16 16 H16 a16 16 0 0 1 -16 -16 V106 a18 18 0 0 0 0 -36 V16 A16 16 0 0 1 16 0 Z"
        fill="#1C1813" stroke="#F59E0B" stroke-width="2.5"/>
      <line x1="210" y1="14" x2="210" y2="176" stroke="#322B21" stroke-width="2.5" stroke-dasharray="2 9"/>
      <!-- QR -->
      <g transform="translate(232 56)" fill="#FBBF24">
        <rect x="0" y="0" width="14" height="14"/><rect x="22" y="0" width="14" height="14"/><rect x="44" y="0" width="14" height="14"/>
        <rect x="0" y="22" width="14" height="14"/><rect x="44" y="22" width="14" height="14"/>
        <rect x="22" y="22" width="8" height="8" fill="#F59E0B"/>
        <rect x="0" y="44" width="14" height="14"/><rect x="22" y="44" width="14" height="14"/><rect x="44" y="44" width="14" height="14"/>
      </g>
      <!-- label lines -->
      <rect x="30" y="56" width="120" height="14" rx="7" fill="#FAF7F2" opacity="0.85"/>
      <rect x="30" y="86" width="150" height="9" rx="4.5" fill="#A89D8C" opacity="0.6"/>
      <rect x="30" y="106" width="96" height="9" rx="4.5" fill="#A89D8C" opacity="0.4"/>
      <circle cx="44" cy="146" r="9" fill="#F59E0B"/>
      <rect x="62" y="140" width="80" height="11" rx="5.5" fill="#FBBF24" opacity="0.85"/>
    </g>
  </g>

  <text x="48" y="464" font-family="ui-monospace, monospace" font-size="18" fill="#A89D8C">&lt;marketplace /&gt;</text>
</svg>
