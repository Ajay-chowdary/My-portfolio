    <circle cx="90" cy="130" r="9"/>
    <circle cx="170" cy="110" r="7"/>
    <circle cx="130" cy="190" r="10"/>
    <circle cx="210" cy="200" r="7"/>
    <circle cx="80" cy="250" r="8"/>
    <circle cx="160" cy="280" r="9"/>
    <circle cx="220" cy="320" r="7"/>
    <circle cx="110" cy="330" r="8"/>
  </g>

  <!-- RIGHT: connected graph (GNN) -->
  <g stroke="#F59E0B" stroke-width="2.5" stroke-opacity="0.55">
    <line x1="380" y1="130" x2="470" y2="110"/>
    <line x1="380" y1="130" x2="420" y2="220"/>
    <line x1="470" y1="110" x2="540" y2="190"/>
    <line x1="420" y1="220" x2="540" y2="190"/>
    <line x1="420" y1="220" x2="470" y2="320"/>
    <line x1="540" y1="190" x2="520" y2="300"/>
    <line x1="470" y1="320" x2="520" y2="300"/>
  </g>
  <g>
    <circle cx="380" cy="130" r="13" fill="#1C1813" stroke="#FBBF24" stroke-width="3"/>
    <circle cx="470" cy="110" r="11" fill="#F59E0B"/>
    <circle cx="420" cy="220" r="18" fill="#FBBF24"/>
    <circle cx="540" cy="190" r="13" fill="#F59E0B"/>
    <circle cx="470" cy="320" r="12" fill="#1C1813" stroke="#FBBF24" stroke-width="3"/>
    <circle cx="520" cy="300" r="10" fill="#F59E0B"/>
  </g>

  <!-- vs badge -->
  <circle cx="300" cy="225" r="26" fill="#1C1813" stroke="#322B21" stroke-width="2"/>
  <text x="300" y="232" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#FBBF24">vs</text>

  <text x="36" y="416" font-family="ui-monospace, monospace" font-size="16" fill="#A89D8C">// graph &gt; keywords</text>
