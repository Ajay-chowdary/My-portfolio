<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GNN vs content-based article cover">
  <defs>
    <radialGradient id="bg2" cx="72%" cy="46%" r="58%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="bd2" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#322B21"/>
    </pattern>
  </defs>
  <rect width="600" height="450" fill="#14110E"/>
  <rect width="600" height="450" fill="url(#bd2)"/>
  <rect width="600" height="450" fill="url(#bg2)"/>

  <!-- divider -->
  <line x1="300" y1="80" x2="300" y2="370" stroke="#322B21" stroke-width="2" stroke-dasharray="2 8"/>

  <!-- LEFT: scattered, disconnected dots (content-based) -->
